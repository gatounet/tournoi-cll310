<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saisie des scores — Tournoi de Basketball</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0B1220;
      --navy-2:#15213A;
      --navy-3:#1E2D4D;
      --cream:#F4F1EA;
      --orange:#FF6B35;
      --orange-dim:#E55A28;
      --gold:#FFD23F;
      --live:#16C172;
      --line-light:#E7E2D7;
      --ink:#13182A;
      --ink-soft:#5B6478;
      --display:'Oswald',sans-serif;
      --body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

    #loginScreen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999}
    .login-box{background:#fff;border-radius:16px;padding:36px 32px;width:340px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.35)}
    .login-icon{width:54px;height:54px;background:linear-gradient(145deg,var(--orange),var(--orange-dim));border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:26px;margin:0 auto 16px;box-shadow:0 6px 18px rgba(255,107,53,.35)}
    .login-title{font-family:var(--display);font-size:19px;font-weight:600;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--ink-soft);margin-bottom:24px}
    .login-input{width:100%;padding:11px 14px;border:1.5px solid var(--line-light);border-radius:9px;font-size:14px;margin-bottom:12px;font-family:inherit}
    .login-input:focus{outline:none;border-color:var(--orange)}
    .login-btn{width:100%;padding:11px;background:var(--orange);color:white;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .login-btn:hover{background:var(--orange-dim)}
    .login-err{color:#c0392b;font-size:12px;margin-top:10px;display:none}

    .topnav{background:var(--navy);color:var(--cream);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.25)}
    .nav-brand{display:flex;align-items:center;gap:11px}
    .nav-icon{width:36px;height:36px;background:linear-gradient(145deg,var(--orange),var(--orange-dim));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .nav-title{font-family:var(--display);font-size:15px;font-weight:600}
    .nav-sub{font-size:10.5px;color:#8B95AC}
    .logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--cream);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
    .logout-btn:hover{background:rgba(255,255,255,.18)}

    .content{max-width:760px;margin:0 auto;padding:20px 16px 60px}

    .main-tabs{background:var(--navy-2);display:flex;padding:0 16px;gap:2px;overflow-x:auto}
    .main-tab{padding:13px 18px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#7C87A3;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
    .main-tab:hover{color:#C9CFDE}
    .main-tab.active{color:var(--orange);border-bottom-color:var(--orange)}
    .main-page{display:none}
    .main-page.active{display:block}
    .chat-badge{color:var(--orange);font-size:8px;margin-left:2px;animation:blinkChat 1.2s infinite}
    @keyframes blinkChat{0%,100%{opacity:1}50%{opacity:.2}}

    .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:360px}
    .chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 12px}
    .chat-msg{max-width:82%;padding:9px 13px;border-radius:13px;font-size:13.5px;line-height:1.45;position:relative}
    .chat-msg.is-admin{background:var(--navy);color:#E8EAF2;align-self:flex-start;border-bottom-left-radius:4px}
    .chat-msg.is-scorer{background:#fff;border:1px solid var(--line-light);align-self:flex-start;border-bottom-left-radius:4px}
    .chat-msg.is-mine{background:var(--orange);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .chat-msg-author{font-size:10.5px;font-weight:700;opacity:.75;margin-bottom:3px;display:flex;align-items:center;gap:5px}
    .chat-msg-time{font-size:10px;opacity:.6;margin-top:4px;text-align:right}
    .chat-input-row{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--line-light)}
    .chat-input{flex:1;padding:11px 14px;border:1.5px solid var(--line-light);border-radius:24px;font-size:13.5px;font-family:inherit}
    .chat-input:focus{outline:none;border-color:var(--orange)}
    .chat-send-btn{width:42px;height:42px;border-radius:50%;background:var(--orange);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .chat-send-btn:hover{background:var(--orange-dim)}
    .chat-send-btn:disabled{opacity:.5;cursor:not-allowed}

    .filter-strip{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
    .filter-chip{padding:6px 15px;border-radius:20px;border:1.5px solid var(--line-light);font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:#fff;display:flex;align-items:center;gap:6px}
    .filter-chip:hover{border-color:var(--orange)}
    .filter-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .venue-filter{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line-light);font-size:12px;font-weight:600;color:var(--ink-soft);background:#fff;font-family:inherit;cursor:pointer}
    .venue-filter:hover{border-color:var(--orange)}
    .venue-filter:focus{outline:none;border-color:var(--orange)}

    .match-card{background:#fff;border:1px solid var(--line-light);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 2px rgba(19,24,42,.04)}
    .match-card.is-live{border-color:var(--orange)}
    .match-head{padding:12px 18px;background:#FBFAF7;border-bottom:1px solid var(--line-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .match-card.is-live .match-head{background:var(--navy);border-color:var(--navy);color:#E8EAF2}
    .match-meta{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .match-card.is-live .match-meta{color:#9AA4BD}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
    .badge-live{background:rgba(255,107,53,.2);color:#FF8F66}
    .badge-done{background:#E3F6EC;color:#0F8B53}
    .badge-upcoming{background:#FFF3DC;color:#B7740C}
    .badge-planned{background:#EEEEEC;color:#7A7A72}

    .match-body{padding:18px}
    .score-row{display:flex;align-items:center;gap:14px;padding:8px 0}
    .team-side{flex:1;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
    .team-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:white;border:1px solid var(--line-light);padding:3px;flex-shrink:0}
    .team-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
    .score-input{width:64px;padding:8px;border:2px solid var(--line-light);border-radius:10px;font-family:var(--display);font-size:24px;font-weight:600;text-align:center;font-variant-numeric:tabular-nums}
    .score-input:focus{outline:none;border-color:var(--orange)}
    .score-stepper{display:flex;align-items:center;gap:6px}
    .step-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line-light);background:#fff;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex-shrink:0}
    .step-btn:hover{background:#FBFAF7;border-color:#C7C2B2}
    .step-btn.plus{background:#E3F6EC;border-color:#A8E0C2;color:#0F8B53}
    .step-btn.plus:hover{background:#D2F0E0}
    .score-divider{font-size:16px;color:#C7C2B2;font-weight:300}
    .period-row{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;margin-top:8px;border-top:1px solid var(--line-light)}
    .period-stepper{display:flex;align-items:center;gap:10px}
    .period-value{font-family:var(--display);font-size:15px;font-weight:600;min-width:46px;text-align:center;font-variant-numeric:tabular-nums}
    .pts-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:12px;font-size:10.5px;font-weight:700;margin-top:4px}
    .pts-win{background:#E3F6EC;color:#0F8B53}
    .pts-draw{background:#FFF3DC;color:#B7740C}
    .pts-loss{background:#fde8e8;color:#c0392b}

    .edit-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-light)}
    .edit-field{display:flex;flex-direction:column;gap:5px}
    .edit-label{font-size:11px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:5px}
    .edit-input{padding:8px 10px;border:1.5px solid var(--line-light);border-radius:8px;font-size:13px;font-family:inherit}
    .edit-input:focus{outline:none;border-color:var(--orange)}

    .action-bar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:1.5px solid var(--line-light);background:#fff;font-size:12.5px;cursor:pointer;color:var(--ink);font-family:inherit;font-weight:600;transition:all .15s}
    .btn:hover{border-color:#C7C2B2;background:#FBFAF7}
    .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
    .btn-primary:hover{background:var(--navy-2)}
    .btn-success{background:#E3F6EC;color:#0F8B53;border-color:#A8E0C2}
    .btn-success:hover{background:#D2F0E0}
    .btn-warning{background:#FFF3DC;color:#B7740C;border-color:#FFD98A}
    .btn-warning:hover{background:#FFEAC0}
    .btn-danger{background:#fde8e8;color:#c0392b;border-color:#f5b7b7}
    .btn-danger:hover{background:#fcd9d9}

    .toast{position:fixed;bottom:24px;right:24px;left:24px;max-width:360px;margin-left:auto;background:var(--navy);color:white;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;align-items:center;gap:9px;box-shadow:0 8px 28px rgba(0,0,0,.3);pointer-events:none}
    .toast.show{display:flex;animation:fadeUp .2s;pointer-events:auto}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .empty{text-align:center;padding:60px 20px;color:#B7BECF}
    .empty i{font-size:36px;margin-bottom:10px;display:block;color:#D8D3C4}

    @media(max-width:480px){
      .score-row{gap:8px}
      .team-side{font-size:12.5px}
      .score-input{width:52px;font-size:20px;padding:6px}
      .edit-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🏀</div>
    <div class="login-title">Espace Scoreur</div>
    <div class="login-sub">Connecte-toi pour saisir les scores</div>
    <input type="email" class="login-input" id="loginUser" placeholder="Adresse email" autocomplete="username">
    <input type="password" class="login-input" id="loginPass" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()" id="loginBtn"><i class="ti ti-login"></i> Se connecter</button>
    <div class="login-err" id="loginErr">Email ou mot de passe incorrect</div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>

<div id="mainApp" style="display:none">
  <nav class="topnav">
    <div class="nav-brand">
      <div class="nav-icon">🏀</div>
      <div>
        <div class="nav-title">Espace Scoreur</div>
        <div class="nav-sub" id="userLabel">—</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Déconnexion</button>
  </nav>

  <div class="main-tabs" id="mainTabs">
    <div class="main-tab active" onclick="switchMainTab('matches',this)"><i class="ti ti-ball-basketball"></i> Matchs</div>
    <div class="main-tab" onclick="switchMainTab('chat',this)"><i class="ti ti-message-circle-2"></i> Chat <span class="chat-badge" id="chatBadge" style="display:none">●</span></div>
    <div class="main-tab" onclick="switchMainTab('rules',this)"><i class="ti ti-file-text"></i> Règlement</div>
    <div class="main-tab" id="snackMainTab" style="display:none" onclick="switchMainTab('snack',this)"><i class="ti ti-glass-cocktail"></i> Buvette</div>
  </div>

  <div class="content">
    <div class="main-page active" id="page-matches">
      <div class="filter-strip" id="filterStrip">
        <div class="filter-chip active" onclick="setFilter('all',this)"><i class="ti ti-list"></i> Tous</div>
        <div class="filter-chip" onclick="setFilter('live',this)"><i class="ti ti-live-view"></i> En direct</div>
        <div class="filter-chip" onclick="setFilter('upcoming',this)"><i class="ti ti-clock"></i> À venir</div>
        <div class="filter-chip" onclick="setFilter('done',this)"><i class="ti ti-check"></i> Terminés</div>
        <select class="venue-filter" id="venueFilter" onchange="setVenueFilter(this.value)">
          <option value="all">🏟️ Tous les terrains</option>
        </select>
      </div>
      <div id="matchesGrid"><div class="empty"><i class="ti ti-loader-2"></i> Chargement des matchs…</div></div>
    </div>

    <div class="main-page" id="page-chat">
      <div class="chat-wrap">
        <div class="chat-messages" id="chatMessages"><div class="empty"><i class="ti ti-message-circle-2"></i>Aucun message pour le moment</div></div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="chatInput" placeholder="Écrire un message..." maxlength="500">
          <button class="chat-send-btn" onclick="sendChatMessage()"><i class="ti ti-send"></i></button>
        </div>
      </div>
    </div>

    <div class="main-page" id="page-rules">
      <div id="rulesSection"><div class="empty"><i class="ti ti-file-text"></i>Aucun règlement n'a encore été publié</div></div>
    </div>

    <div class="main-page" id="page-snack">
      <div id="snackSection"><div class="empty"><i class="ti ti-glass-cocktail"></i>Aucun tarif n'a encore été publié</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, serverTimestamp, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBO9fKLF4kkaDAux5SvyOORh-q4YDd_YeQ",
  authDomain: "tournoi-cll310.firebaseapp.com",
  projectId: "tournoi-cll310",
  storageBucket: "tournoi-cll310.firebasestorage.app",
  messagingSenderId: "878229681775",
  appId: "1:878229681775:web:585b78792a49d349a13f9a",
  measurementId: "G-LJC3CHWR5Q"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

window._teams = [];
window._matches = [];
window._groups = [];
window._grounds = [];
window._filter = 'all';
window._venueFilter = 'all';

function toast(msg, type='ok'){
  const t=document.getElementById('toast'); const m=document.getElementById('toastMsg');
  t.style.background = type==='err' ? '#c0392b' : '#0B1220';
  t.querySelector('i').className = type==='err' ? 'ti ti-alert-circle' : 'ti ti-check';
  m.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
window.toast = toast;

function teamName(id){ return window._teams.find(t=>t.id===id)?.name || id || '?'; }
function teamLogo(id){
  const t = window._teams.find(x=>x.id===id);
  return t?.logoUrl ? `<img src="${t.logoUrl}" class="team-logo" alt="${t.name}">` : `<div class="team-dot" style="background:${t?.color||'#999'}"></div>`;
}
function groupName(id){ return window._groups.find(g=>g.id===id)?.name || id || '—'; }
function fmtDtLocal(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDtDisplay(ts){
  if(!ts) return 'Heure non définie';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function statusBadge(s){
  const map = {
    live: '<span class="badge badge-live"><i class="ti ti-live-view"></i> En direct</span>',
    done: '<span class="badge badge-done"><i class="ti ti-check"></i> Terminé</span>',
    upcoming: '<span class="badge badge-upcoming"><i class="ti ti-clock"></i> À venir</span>',
    planned: '<span class="badge badge-planned"><i class="ti ti-calendar"></i> Planifié</span>',
  };
  return map[s] || map.planned;
}
const SPORT_RULES = {
  basketball: { label:'Basketball', emoji:'🏀', win:2, draw:1, loss:0, allowDraw:false },
  football:   { label:'Football',   emoji:'⚽', win:3, draw:1, loss:0, allowDraw:true },
  handball:   { label:'Handball',   emoji:'🤾', win:2, draw:1, loss:0, allowDraw:true },
  volleyball: { label:'Volleyball', emoji:'🏐', win:2, draw:0, loss:0, allowDraw:false },
};
window._settings = {};
function getCurrentSport(){ return window._settings?.sport || 'basketball'; }
function calcPts(a,b){
  const rules = SPORT_RULES[getCurrentSport()] || SPORT_RULES.basketball;
  if(a>b) return {A:rules.win,B:rules.loss};
  if(b>a) return {A:rules.loss,B:rules.win};
  return {A:rules.draw,B:rules.draw};
}
function ptsLabel(pts){
  const rules = SPORT_RULES[getCurrentSport()] || SPORT_RULES.basketball;
  if(pts===rules.win) return {cls:'pts-win', text:`🏆 Victoire · ${pts}pt${pts>1?'s':''}`};
  if(pts===rules.loss) return {cls:'pts-loss', text:`❌ Défaite · ${pts}pt${pts>1?'s':''}`};
  return {cls:'pts-draw', text:`🤝 Nul · ${pts}pt${pts>1?'s':''}`};
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function renderRules(){
  const rulesText = window._settings?.rules || '';
  const el = document.getElementById('rulesSection');
  el.innerHTML = rulesText.trim()
    ? `<div class="match-card"><div class="match-head"><div class="match-meta"><i class="ti ti-file-text"></i> Règlement du tournoi</div></div>
        <div class="match-body" style="white-space:pre-wrap;font-size:13.5px;line-height:1.7">${escapeHtml(rulesText)}</div></div>`
    : `<div class="empty"><i class="ti ti-file-text"></i>Aucun règlement n'a encore été publié</div>`;
}
function renderSnack(){
  const enabled = !!window._settings?.snackEnabled;
  document.getElementById('snackMainTab').style.display = enabled ? 'flex' : 'none';
  if(!enabled) return;
  const menuText = window._settings?.snackMenu || '';
  const el = document.getElementById('snackSection');
  el.innerHTML = menuText.trim()
    ? `<div class="match-card"><div class="match-head"><div class="match-meta"><i class="ti ti-glass-cocktail"></i> Tarifs de la buvette</div></div>
        <div class="match-body" style="white-space:pre-wrap;font-size:13.5px;line-height:1.7">${escapeHtml(menuText)}</div></div>`
    : `<div class="empty"><i class="ti ti-glass-cocktail"></i>Aucun tarif n'a encore été publié</div>`;
}
window.switchMainTab = function(name, el){
  document.querySelectorAll('.main-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name === 'chat'){
    document.getElementById('chatBadge').style.display = 'none';
    window._chatHasUnread = false;
    scrollChatToBottom();
  }
};

// ===== CHAT =====
window._chatMessages = [];
window._chatInitialized = false;
window._chatHasUnread = false;

function initChatListener(){
  if(window._chatInitialized) return;
  window._chatInitialized = true;
  const chatQuery = query(collection(db,'chat_messages'), orderBy('createdAt','asc'), limit(200));
  onSnapshot(chatQuery, snap => {
    window._chatMessages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderChat();
    const chatPageActive = document.getElementById('page-chat')?.classList.contains('active');
    if(!chatPageActive && window._chatMessages.length){
      window._chatHasUnread = true;
      document.getElementById('chatBadge').style.display = 'inline';
    }
  }, err => {
    console.error('Chat listener error', err);
  });
}

function fmtChatTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function renderChat(){
  const el = document.getElementById('chatMessages');
  if(!window._chatMessages.length){
    el.innerHTML = '<div class="empty"><i class="ti ti-message-circle-2"></i>Aucun message pour le moment</div>';
    return;
  }
  const myEmail = window._currentUserEmail;
  el.innerHTML = window._chatMessages.map(m => {
    const isMine = m.authorEmail === myEmail;
    const roleCls = isMine ? 'is-mine' : (m.authorRole === 'admin' ? 'is-admin' : 'is-scorer');
    const roleIcon = m.authorRole === 'admin' ? '<i class="ti ti-shield-star"></i>' : '<i class="ti ti-user"></i>';
    return `<div class="chat-msg ${roleCls}">
      ${!isMine ? `<div class="chat-msg-author">${roleIcon} ${escapeHtml(m.authorEmail||'?')}</div>` : ''}
      <div>${escapeHtml(m.text||'')}</div>
      <div class="chat-msg-time">${fmtChatTime(m.createdAt)}</div>
    </div>`;
  }).join('');
  scrollChatToBottom();
}

function scrollChatToBottom(){
  const el = document.getElementById('chatMessages');
  if(el) el.scrollTop = el.scrollHeight;
}

window.sendChatMessage = async function(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  if(!window._currentUserEmail){
    toast('Connexion requise pour envoyer un message', 'err');
    return;
  }
  const btn = document.querySelector('.chat-send-btn');
  btn.disabled = true;
  try{
    await addDoc(collection(db,'chat_messages'), {
      text,
      authorEmail: window._currentUserEmail,
      authorRole: window._currentUserRole,
      createdAt: serverTimestamp(),
    });
    input.value = '';
  }catch(e){
    console.error(e);
    toast('Erreur : message non envoyé', 'err');
  }finally{
    btn.disabled = false;
    input.focus();
  }
};
document.getElementById('chatInput')?.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); window.sendChatMessage(); }
});

window.setFilter = function(f, el){
  window._filter = f;
  document.querySelectorAll('#filterStrip .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderMatches();
};

window.setVenueFilter = function(v){
  window._venueFilter = v;
  renderMatches();
};

function populateVenueFilter(){
  const sel = document.getElementById('venueFilter');
  const current = window._venueFilter;
  const venueNames = [...new Set(window._matches.map(m=>m.venue).filter(Boolean))].sort();
  sel.innerHTML = '<option value="all">🏟️ Tous les terrains</option>' +
    venueNames.map(v => `<option value="${v}" ${v===current?'selected':''}>${v}</option>`).join('');
  // Restore selection if it still exists in the list, otherwise fall back to "all"
  if(current !== 'all' && !venueNames.includes(current)){
    window._venueFilter = 'all';
    sel.value = 'all';
  }
}

function renderMatches(){
  populateVenueFilter();
  const f = window._filter;
  const vf = window._venueFilter;
  let list = f === 'all' ? window._matches : window._matches.filter(m => m.status === f);
  if(vf !== 'all') list = list.filter(m => m.venue === vf);
  const grid = document.getElementById('matchesGrid');

  if(!list.length){
    grid.innerHTML = '<div class="empty"><i class="ti ti-ball-basketball"></i>Aucun match pour ce filtre</div>';
    return;
  }

  grid.innerHTML = list.map(m => {
    const isLive = m.status === 'live';
    const isDone = m.status === 'done';
    const sA = m.scoreA || 0, sB = m.scoreB || 0;
    const pts = isDone ? calcPts(sA, sB) : { A: null, B: null };
    const grpLabel = m.group ? `Groupe ${groupName(m.group)}` : (m.round || '');

    return `<div class="match-card ${isLive ? 'is-live' : ''}" data-match-id="${m.id}">
      <div class="match-head">
        <div class="match-meta">
          <i class="ti ti-calendar"></i> ${fmtDtDisplay(m.scheduledAt)}
          ${m.venue ? `<span>· <i class="ti ti-map-pin"></i> ${m.venue}</span>` : ''}
          ${grpLabel ? `<span>· ${grpLabel}</span>` : ''}
        </div>
        ${statusBadge(m.status)}
      </div>
      <div class="match-body">
        <div class="score-row">
          <div class="team-side">${teamLogo(m.teamA)} ${teamName(m.teamA)}</div>
          <div class="score-stepper">
            <button class="step-btn" onclick="bumpScore('${m.id}','scoreA',-1)">−</button>
            <input class="score-input" type="number" min="0" id="sA-${m.id}" value="${sA}" onchange="saveScoreField('${m.id}','scoreA',this.value)">
            <button class="step-btn plus" onclick="bumpScore('${m.id}','scoreA',1)">+</button>
          </div>
          <div class="score-divider">—</div>
          <div class="score-stepper">
            <button class="step-btn" onclick="bumpScore('${m.id}','scoreB',-1)">−</button>
            <input class="score-input" type="number" min="0" id="sB-${m.id}" value="${sB}" onchange="saveScoreField('${m.id}','scoreB',this.value)">
            <button class="step-btn plus" onclick="bumpScore('${m.id}','scoreB',1)">+</button>
          </div>
          <div class="team-side" style="justify-content:flex-end;text-align:right">${teamName(m.teamB)} ${teamLogo(m.teamB)}</div>
        </div>
        ${isDone ? `<div style="display:flex;justify-content:space-between;padding:0 2px">
          <span class="pts-badge ${ptsLabel(pts.A).cls}">${ptsLabel(pts.A).text}</span>
          <span class="pts-badge ${ptsLabel(pts.B).cls}">${ptsLabel(pts.B).text}</span>
        </div>` : ''}

        ${(isLive || isDone) ? `<div class="period-row">
          <span class="edit-label"><i class="ti ti-clock-play"></i> Période</span>
          <div class="period-stepper">
            <button class="step-btn" onclick="bumpPeriod('${m.id}',-1)">−</button>
            <span class="period-value">${m.period || 1} / ${m.maxPeriods || 4}</span>
            <button class="step-btn plus" onclick="bumpPeriod('${m.id}',1)">+</button>
          </div>
        </div>` : ''}

        <div class="edit-row">
          <div class="edit-field">
            <label class="edit-label"><i class="ti ti-calendar-time"></i> Date et heure</label>
            <input class="edit-input" type="datetime-local" id="dt-${m.id}" value="${fmtDtLocal(m.scheduledAt)}">
          </div>
          <div class="edit-field">
            <label class="edit-label"><i class="ti ti-map-pin"></i> Terrain</label>
            <select class="edit-input" id="venue-${m.id}">
              <option value="">—</option>
              ${window._grounds.map(g => `<option value="${g.name}" ${m.venue===g.name?'selected':''}>${g.name}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="action-bar">
          ${!isLive ? `<button class="btn btn-primary" onclick="setStatus('${m.id}','live')"><i class="ti ti-player-play"></i> Démarrer</button>` : ''}
          ${isLive ? `<button class="btn btn-success" onclick="setStatus('${m.id}','done')"><i class="ti ti-flag-3"></i> Terminer</button>` : ''}
          ${isDone ? `<button class="btn btn-warning" onclick="setStatus('${m.id}','live')"><i class="ti ti-refresh"></i> Reprendre</button>` : ''}
          <button class="btn btn-danger" onclick="setStatus('${m.id}','planned')"><i class="ti ti-rotate-clockwise-2"></i> Reset</button>
          <button class="btn" onclick="saveMatch('${m.id}')"><i class="ti ti-device-floppy"></i> Enregistrer</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.bumpScore = async function(id, field, delta){
  const m = window._matches.find(x=>x.id===id);
  if(!m) return;
  const current = parseInt(m[field]) || 0;
  const v = Math.max(0, current + delta);
  const inputId = field==='scoreA' ? 'sA-'+id : 'sB-'+id;
  const inputEl = document.getElementById(inputId);
  if(inputEl) inputEl.value = v;
  try{
    await updateDoc(doc(db,'matches',id), { [field]: v, updatedAt: serverTimestamp() });
  }catch(e){
    console.error(e);
    toast('Erreur : accès refusé ou problème réseau', 'err');
  }
};

window.bumpPeriod = async function(id, delta){
  const m = window._matches.find(x=>x.id===id);
  if(!m) return;
  const maxP = m.maxPeriods || 4;
  const current = parseInt(m.period) || 1;
  const v = Math.max(1, Math.min(maxP, current + delta));
  try{
    await updateDoc(doc(db,'matches',id), { period: v, updatedAt: serverTimestamp() });
  }catch(e){
    console.error(e);
    toast('Erreur : accès refusé ou problème réseau', 'err');
  }
};

window.saveScoreField = async function(id, field, val){
  const v = Math.max(0, parseInt(val) || 0);
  document.getElementById(field==='scoreA' ? 'sA-'+id : 'sB-'+id).value = v;
  try{
    await updateDoc(doc(db,'matches',id), { [field]: v, updatedAt: serverTimestamp() });
    toast('Score mis à jour ✓');
  }catch(e){
    console.error(e);
    toast('Erreur : accès refusé ou problème réseau', 'err');
  }
};

window.saveMatch = async function(id){
  const sA = Math.max(0, parseInt(document.getElementById('sA-'+id)?.value) || 0);
  const sB = Math.max(0, parseInt(document.getElementById('sB-'+id)?.value) || 0);
  const venue = document.getElementById('venue-'+id)?.value || '';
  const dtVal = document.getElementById('dt-'+id)?.value;
  const update = {
    scoreA: sA,
    scoreB: sB,
    venue,
    updatedAt: serverTimestamp(),
  };
  if(dtVal) update.scheduledAt = new Date(dtVal);
  try{
    await updateDoc(doc(db,'matches',id), update);
    toast('Match enregistré ✓');
  }catch(e){
    console.error(e);
    toast('Erreur : accès refusé ou problème réseau', 'err');
  }
};

window.setStatus = async function(id, status){
  try{
    await updateDoc(doc(db,'matches',id), { status, updatedAt: serverTimestamp() });
    toast(status==='live' ? 'Match démarré' : status==='done' ? 'Match terminé' : 'Match réinitialisé');
  }catch(e){
    console.error(e);
    toast('Erreur : accès refusé ou problème réseau', 'err');
  }
};

window.firebaseLogin = (email, password) => signInWithEmailAndPassword(auth, email, password);
window.firebaseLogout = () => signOut(auth);

window._currentUserRole = 'scorer';
window._currentUserEmail = null;

onAuthStateChanged(auth, async user => {
  if(user){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userLabel').textContent = user.email || 'Scoreur';
    window._currentUserEmail = user.email || null;
    try{
      const roleSnap = await getDoc(doc(db,'roles',user.uid));
      window._currentUserRole = (roleSnap.exists() && roleSnap.data().role === 'scorer') ? 'scorer' : 'admin';
    }catch(e){
      console.warn('Role check failed', e);
      window._currentUserRole = 'scorer';
    }
    initChatListener();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  }
});

onSnapshot(doc(db,'settings','tournament'), snap => {
  if(snap.exists()) window._settings = snap.data();
  renderMatches();
  renderRules();
  renderSnack();
});
onSnapshot(collection(db,'teams'), snap => {
  window._teams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderMatches();
});
onSnapshot(collection(db,'groups'), snap => {
  window._groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderMatches();
});
onSnapshot(collection(db,'grounds'), snap => {
  window._grounds = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderMatches();
});
onSnapshot(collection(db,'matches'), snap => {
  window._matches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  window._matches.sort((a,b) => {
    const ta = a.scheduledAt?.toDate?.() || new Date(a.scheduledAt || 0);
    const tb = b.scheduledAt?.toDate?.() || new Date(b.scheduledAt || 0);
    return ta - tb;
  });
  renderMatches();
});
</script>

<script>
async function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  if(!u || !p){
    document.getElementById('loginErr').textContent = 'Merci de renseigner email et mot de passe';
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Connexion...';
  document.getElementById('loginErr').style.display = 'none';
  try{
    await window.firebaseLogin(u, p);
  }catch(e){
    const messages = {
      'auth/invalid-credential': 'Email ou mot de passe incorrect',
      'auth/invalid-email': 'Adresse email invalide',
      'auth/user-not-found': 'Aucun compte avec cet email',
      'auth/wrong-password': 'Mot de passe incorrect',
      'auth/too-many-requests': 'Trop de tentatives, réessaie plus tard',
    };
    document.getElementById('loginErr').textContent = messages[e.code] || 'Email ou mot de passe incorrect';
    document.getElementById('loginErr').style.display = 'block';
  }finally{
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-login"></i> Se connecter';
  }
}
function doLogout(){ window.firebaseLogout(); }
document.getElementById('loginPass').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
document.getElementById('loginUser').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
